<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>API SENTINEL | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #050505;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
            z-index: -1;
        }

        @keyframes moveGrid {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(50px);
            }
        }

        .header-style {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 2px 2px #ff0000, -2px -2px #0000ff;
            letter-spacing: 0.5rem;
        }

        .glow-green {
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.8);
        }

        .fade-row {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body class="text-white p-6">
    <div class="bg-grid"></div>

    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
        <div class="text-center md:text-left">
            <h1 class="text-4xl md:text-6xl font-black header-style animate-pulse mb-2">API-SENTINEL</h1>
            <div class="flex items-center gap-2 text-green-500 text-xs">
                <span class="inline-block w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                CORE SYSTEMS ONLINE // LOCALHOST_ACTIVE
            </div>
        </div>

        <div
            class="bg-white/5 border border-green-500/20 backdrop-blur-md p-6 rounded-lg w-full max-w-sm text-center shadow-[0_0_20px_rgba(34,197,94,0.1)]">
            <span class="text-gray-500 text-[10px] uppercase tracking-[0.3em]">Current Status</span>
            <div id="status-display" class="text-4xl font-bold mt-1">IDLE</div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white/10 p-4 rounded border border-white/10 shadow-xl">
                <input id="url"
                    class="w-full bg-black border border-green-900 p-3 text-green-400 rounded focus:border-green-400 outline-none mb-3 transition-all"
                    placeholder="google.com">
                <button onclick="checkAPI()"
                    class="w-full bg-green-600 hover:bg-green-500 text-black font-bold py-3 rounded transform active:scale-95 transition-all uppercase text-sm tracking-widest">
                    Execute Scan
                </button>
            </div>

            <div class="bg-black/80 border border-green-900/40 p-4 rounded h-64 overflow-hidden relative">
                <div class="text-[9px] text-green-700 mb-2 font-bold uppercase tracking-widest">System Messages</div>
                <div id="logs" class="text-[11px] text-green-500/80 leading-relaxed">
                    <p>> AI Core initialized...</p>
                </div>
            </div>
        </div>

        <div
            class="lg:col-span-3 bg-white/5 border border-white/10 backdrop-blur-lg rounded-xl overflow-hidden shadow-2xl">
            <div class="bg-white/5 p-4 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-green-400 font-bold tracking-widest text-sm uppercase flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> Live Telemetry
                </h2>
                <span class="text-[10px] text-gray-500 font-mono" id="clock">00:00:00</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-black/40 text-gray-400 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Target URL</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Latency</th>
                            <th class="p-4">Time</th>
                        </tr>
                    </thead>
                    <tbody id="history" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function addLog(msg) {
            const logs = document.getElementById('logs');
            const p = document.createElement('p');
            p.innerHTML = `> ${msg}`;
            logs.prepend(p);
            if (logs.children.length > 10) logs.lastElementChild.remove();
        }

        async function checkAPI() {
            const urlInput = document.getElementById("url");
            let url = urlInput.value.trim();
            const statusDisplay = document.getElementById("status-display");

            if (!url) return alert("Enter a URL");

            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            statusDisplay.innerHTML = `<span class="animate-pulse text-blue-400">SCANNING...</span>`;
            addLog(`Requesting: ${url}`);

            try {
                const start = Date.now();
                // mode 'no-cors' allows us to ping sites without a backend
                await fetch(url, { mode: 'no-cors' });
                const latency = Date.now() - start;
                renderResult(url, "UP", latency);
            } catch (error) {
                renderResult(url, "DOWN", 0);
            }
        }

        function renderResult(url, status, latency) {
            const isUp = status === "UP";
            const color = isUp ? "text-green-400" : "text-red-500";
            const statusText = isUp ? "ACTIVE" : "OFFLINE";

            // 1. Update Top Display
            document.getElementById("status-display").innerHTML = `
                <span class="${color} glow-green font-black">${statusText}</span>
                <div class="text-[10px] text-gray-400">${latency} MS</div>
            `;

            // 2. Update Table
            const historyBody = document.getElementById("history");
            const row = document.createElement("tr");
            row.className = "border-b border-white/5 fade-row hover:bg-white/5";
            row.innerHTML = `
                <td class="p-4 font-bold text-gray-300 truncate max-w-[200px]">${url}</td>
                <td class="p-4 ${color} font-black">${statusText}</td>
                <td class="p-4 text-gray-400">${latency}ms</td>
                <td class="p-4 text-gray-600 text-[10px] font-mono">${new Date().toLocaleTimeString()}</td>
            `;
            historyBody.prepend(row);

            addLog(`${url} -> ${statusText} [${latency}ms]`);
        }
    </script>
</body>

</html>
